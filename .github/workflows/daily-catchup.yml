name: Pipeline

on:
  workflow_dispatch:
  schedule:
    - cron: "20 22 * * 0-4"

permissions:
  contents: write

concurrency:
  group: overnight-alpha-pipeline
  cancel-in-progress: false

jobs:
  run-daily-catchup:
    name: Run Daily Catch-Up Pipeline
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create environment file
        run: |
          echo "DART_API_KEY=${{ secrets.DART_API_KEY }}" >> .env
          echo "NAVER_CLIENT_ID=${{ secrets.NAVER_CLIENT_ID }}" >> .env
          echo "NAVER_CLIENT_SECRET=${{ secrets.NAVER_CLIENT_SECRET }}" >> .env
          echo "KIS_APP_KEY=${{ secrets.KIS_APP_KEY }}" >> .env
          echo "KIS_APP_SECRET=${{ secrets.KIS_APP_SECRET }}" >> .env
          echo "KIS_ENV=${{ secrets.KIS_ENV }}" >> .env

      - name: Make scripts executable
        run: |
          chmod +x scripts/run_catchup.sh

      - name: Prepare runtime directories
        run: |
          mkdir -p data/raw
          mkdir -p data/processed
          mkdir -p data/predictions
          mkdir -p reports/daily_prediction
          mkdir -p reports/daily_review
          mkdir -p reports/single_stock
          mkdir -p logs

      - name: Run catch-up pipeline
        run: |
          set +e
          ./scripts/run_catchup.sh
          EXIT_CODE=$?

          echo ""
          echo "===== Catch-up logs ====="
          if ls logs/catchup_*.log 1> /dev/null 2>&1; then
            tail -n 300 logs/catchup_*.log
          else
            echo "No catch-up log file found."
          fi

          echo ""
          echo "Script exit code: $EXIT_CODE"

          if [ "$EXIT_CODE" = "0" ]; then
            echo "Catch-up completed with exit code 0."
            exit 0
          fi

          if [ "$EXIT_CODE" = "143" ]; then
            echo "Catch-up ended with exit code 143."
            if ls logs/catchup_*.log 1> /dev/null 2>&1; then
              echo "Treating 143 as soft termination so generated files can still be committed."
              exit 0
            fi
            echo "No catch-up log was generated; keeping exit code 143 as a failure."
            exit 143
          fi

          if grep -q "Catch-up completed successfully." logs/catchup_*.log 2>/dev/null; then
            echo "Catch-up success message found in log. Treating workflow as successful."
            exit 0
          fi

          exit $EXIT_CODE

      - name: Commit generated reports and dashboard
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/processed/automation_history.csv || true
	  git add data/processed/price_watchlist.csv || true
          git add data/processed/ml_dataset_*.csv || true
          git add data/processed/daily_price_signals_*.csv || true
          git add data/processed/price_based_candidates_*.csv || true
          git add data/processed/social_attention_features_*.csv || true
          git add data/processed/learned_event_rules_*.csv || true
          git add data/processed/snacks_market_features_*.csv || true
          git add data/processed/market_adjusted_score_adjustments_*.csv || true
          git add data/predictions/error_notes_*.csv || true
          git add data/predictions/market_adjusted_evaluation_*.csv || true
          git add data/predictions/price_candidate_evaluation_*.csv || true
          git add data/raw/snacks_newsletters_*.csv || true
          git add reports/daily_prediction/*.md || true
          git add reports/daily_review/*.md || true
          git add reports/single_stock/*.md || true
          git add docs/*.md || true
          git add docs/*.html || true
          git add docs/posts/*.md || true

          if git diff --cached --quiet; then
            echo "No generated changes to commit."
          else
            git commit -m "Update daily automated reports and dashboard"
            git pull --rebase origin main
            git push
          fi
