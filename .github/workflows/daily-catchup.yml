name: Pipeline

on:
  workflow_dispatch:
  schedule:
    - cron: "0 23 * * 0-4"

permissions:
  contents: write

concurrency:
  group: overnight-alpha-pipeline
  cancel-in-progress: false

jobs:
  run-daily-catchup:
    name: Run Daily Catch-Up Pipeline
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create environment file
        run: |
          echo "DART_API_KEY=${{ secrets.DART_API_KEY }}" >> .env
          echo "NAVER_CLIENT_ID=${{ secrets.NAVER_CLIENT_ID }}" >> .env
          echo "NAVER_CLIENT_SECRET=${{ secrets.NAVER_CLIENT_SECRET }}" >> .env

      - name: Make scripts executable
        run: |
          chmod +x scripts/run_catchup.sh

      - name: Prepare runtime directories
        run: |
          mkdir -p data/raw
          mkdir -p data/processed
          mkdir -p data/predictions
          mkdir -p reports/daily_prediction
          mkdir -p reports/daily_review
          mkdir -p reports/single_stock
          mkdir -p logs

      - name: Run catch-up pipeline
        run: |
          set +e
          ./scripts/run_catchup.sh
          EXIT_CODE=$?

          echo ""
          echo "===== Catch-up logs ====="
          if ls logs/catchup_*.log 1> /dev/null 2>&1; then
            tail -n 300 logs/catchup_*.log
          else
            echo "No catch-up log file found."
          fi

          exit $EXIT_CODE

      - name: Commit generated reports and dashboard
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/processed/automation_history.csv || true
          git add data/processed/social_attention_features_*.csv || true
          git add data/processed/learned_event_rules_*.csv || true
          git add reports/daily_prediction/*.md || true
          git add reports/daily_review/*.md || true
          git add reports/single_stock/*.md || true
          git add docs/*.md || true
          git add docs/*.html || true
          git add docs/posts/*.md || true

          if git diff --cached --quiet; then
            echo "No generated changes to commit."
          else
            git commit -m "Update daily automated reports and dashboard"
            git pull --rebase origin main
            git push
          fi
