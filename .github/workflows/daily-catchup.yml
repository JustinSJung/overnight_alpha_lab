name: Daily Catch-Up Pipeline

on:
  workflow_dispatch:
  schedule:
    - cron: "0 23 * * 1-5"

permissions:
  contents: write

jobs:
  run-daily-catchup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create environment file
        run: |
          echo "DART_API_KEY=${{ secrets.DART_API_KEY }}" >> .env
          echo "NAVER_CLIENT_ID=${{ secrets.NAVER_CLIENT_ID }}" >> .env
          echo "NAVER_CLIENT_SECRET=${{ secrets.NAVER_CLIENT_SECRET }}" >> .env

      - name: Make scripts executable
        run: |
          chmod +x scripts/run_catchup.sh

      - name: Run catch-up pipeline
        run: |
          ./scripts/run_catchup.sh

      - name: Commit generated reports and dashboard
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/processed/automation_history.csv || true
          git add reports/daily_prediction/*.md || true
          git add reports/daily_review/*.md || true
          git add reports/single_stock/*.md || true
          git add docs/*.md || true
          git add docs/*.html || true
          git add docs/posts/*.md || true

          if git diff --cached --quiet; then
            echo "No generated changes to commit."
          else
            git commit -m "Update daily automated reports and dashboard"
            git push
          fi
